<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Hunter - Arcade Shooting Game</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-purple: #bc13fe;
            --bg-dark: #0a0a12;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Courier New', Courier, monospace;
            color: white;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: crosshair;
        }

        canvas {
            background: linear-gradient(to bottom, #020024, #090979 35%, #00d4ff 100%);
            image-rendering: pixelated;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        /* UI Elements */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .top-ui {
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .bottom-ui {
            display: flex;
            justify-content: center;
            gap: 20px;
            pointer-events: auto;
        }

        .gun-slot {
            width: 80px;
            height: 80px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .gun-slot.active {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            transform: scale(1.1);
        }

        .gun-slot .key-hint {
            font-size: 10px;
            color: #888;
        }

        .gun-slot .gun-icon {
            font-size: 30px;
        }

        .gun-slot .gun-name {
            font-size: 10px;
            margin-top: 5px;
        }

        #gravity-status {
            position: absolute;
            top: 60px;
            right: 20px;
            font-size: 18px;
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
            opacity: 0;
        }

        #gravity-status.active {
            opacity: 1;
            color: var(--neon-purple);
            box-shadow: 0 0 10px var(--neon-purple);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Screens */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
            pointer-events: auto;
        }

        .overlay h1 {
            font-size: 60px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        .btn {
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 15px 40px;
            font-size: 20px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        #antigravity-tint {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(188, 19, 254, 0) 30%, rgba(188, 19, 254, 0.2) 100%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 10;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="antigravity-tint"></div>

    <div id="ui-layer">
        <div class="top-ui">
            <div id="score">SCORE: 0</div>
            <div id="wave">WAVE: 1</div>
            <div id="lives">LIVES: ❤️❤️❤️</div>
        </div>

        <div id="gravity-status">↑ ANTI-GRAVITY ON (G)</div>

        <div class="bottom-ui">
            <div class="gun-slot active" data-gun="0" onclick="switchGun(0)">
                <span class="key-hint">1</span>
                <span class="gun-icon">🔫</span>
                <span class="gun-name">PISTOL</span>
            </div>
            <div class="gun-slot" data-gun="1" onclick="switchGun(1)">
                <span class="key-hint">2</span>
                <span class="gun-icon">🎯</span>
                <span class="gun-name">SHOTGUN</span>
            </div>
            <div class="gun-slot" data-gun="2" onclick="switchGun(2)">
                <span class="key-hint">3</span>
                <span class="gun-icon">🔥</span>
                <span class="gun-name">MG</span>
            </div>
            <div class="gun-slot" data-gun="3" onclick="switchGun(3)">
                <span class="key-hint">4</span>
                <span class="gun-icon">🔭</span>
                <span class="gun-name">SNIPER</span>
            </div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="overlay">
        <h1>ANTIGRAVITY HUNTER</h1>
        <p>Protect the forest from the wild surge!</p>
        <p>1-4: Switch Guns | G: Toggle Antigravity | Mouse: Aim & Shoot</p>
        <button class="btn" onclick="startGame()">Start Mission</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="overlay hidden">
        <h1>MISSION FAILED</h1>
        <p>The animals escaped into the city.</p>
        <p id="final-score">Final Score: 0</p>
        <button class="btn" onclick="startGame()">Restart</button>
    </div>
</div>

<script>
    /** @type {HTMLCanvasElement} */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const waveEl = document.getElementById('wave');
    const livesEl = document.getElementById('lives');
    const gravityStatus = document.getElementById('gravity-status');
    const antigravityTint = document.getElementById('antigravity-tint');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const finalScoreEl = document.getElementById('final-score');

    // Game Constants & State
    const WIDTH = 1200;
    const HEIGHT = 700;
    canvas.width = WIDTH;
    canvas.height = HEIGHT;

    let gameState = 'START'; // START, PLAYING, GAMEOVER
    let score = 0;
    let lives = 3;
    let wave = 1;
    let antiGravity = false;
    let entities = [];
    let bullets = [];
    let particles = [];
    let lastTime = 0;
    let spawnTimer = 0;
    let currentGunIndex = 0;
    let lastShotTime = 0;

    // Gun Definitions
    const GUNS = [
        { name: 'Pistol', icon: '🔫', fireRate: 400, damage: 10, spread: 0, count: 1, speed: 12, sound: 200 },
        { name: 'Shotgun', icon: '🎯', fireRate: 1000, damage: 15, spread: 0.2, count: 5, speed: 10, sound: 100 },
        { name: 'Machine Gun', icon: '🔥', fireRate: 100, damage: 4, spread: 0.05, count: 1, speed: 15, sound: 300 },
        { name: 'Sniper', icon: '🔭', fireRate: 1500, damage: 100, spread: 0, count: 1, speed: 25, sound: 50 }
    ];

    // Animal Types
    const ANIMAL_TYPES = [
        { type: 'crow', emoji: '🐦', hp: 10, speed: 2, points: 10, mode: 'fly' },
        { type: 'parrot', emoji: '🦜', hp: 15, speed: 2.5, points: 20, mode: 'fly' },
        { type: 'eagle', emoji: '🦅', hp: 30, speed: 3.5, points: 50, mode: 'fly' },
        { type: 'rabbit', emoji: '🐇', hp: 5, speed: 1.5, points: 15, mode: 'hop' },
        { type: 'fox', emoji: '🦊', hp: 20, speed: 3, points: 30, mode: 'run' },
        { type: 'deer', emoji: '🦌', hp: 40, speed: 1.2, points: 40, mode: 'walk' }
    ];

    // Audio Engine
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(freq, type = 'square', duration = 0.1, volume = 0.1) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function playHitSound() { playSound(400, 'sawtooth', 0.05, 0.05); }
    function playDeathSound() { playSound(100, 'sine', 0.3, 0.15); }

    // Classes
    class Bullet {
        constructor(x, y, targetX, targetY, gun) {
            this.x = x;
            this.y = y;
            const angle = Math.atan2(targetY - y, targetX - x) + (Math.random() - 0.5) * gun.spread;
            this.vx = Math.cos(angle) * gun.speed;
            this.vy = Math.sin(angle) * gun.speed;
            this.damage = gun.damage;
            this.radius = 3;
            this.active = true;
        }

        update() {
            if (antiGravity) {
                this.vy -= 0.15; // Curve upward
            }
            this.x += this.vx;
            this.y += this.vy;

            if (this.x < 0 || this.x > WIDTH || this.y < 0 || this.y > HEIGHT) {
                this.active = false;
            }
        }

        draw() {
            ctx.fillStyle = antiGravity ? '#bc13fe' : '#ffff00';
            ctx.shadowBlur = 10;
            ctx.shadowColor = ctx.fillStyle;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    class Animal {
        constructor() {
            const data = ANIMAL_TYPES[Math.floor(Math.random() * ANIMAL_TYPES.length)];
            Object.assign(this, data);
            
            this.side = Math.random() > 0.5 ? 'left' : 'right';
            this.x = this.side === 'left' ? -50 : WIDTH + 50;
            
            if (this.mode === 'fly') {
                this.y = Math.random() * (HEIGHT * 0.5) + 50;
                this.baseY = this.y;
            } else {
                this.y = HEIGHT - 80;
            }

            this.vx = (this.side === 'left' ? 1 : -1) * this.speed * (1 + wave * 0.1);
            this.vy = 0;
            this.hp = data.hp;
            this.maxHp = data.hp;
            this.hitFlash = 0;
            this.active = true;
            this.rotation = 0;
            this.floating = 0; // Sine wave offset
        }

        update() {
            if (antiGravity) {
                this.vy -= 0.05; // Float up
                this.vx += (Math.random() - 0.5) * 0.5; // Drift
                this.rotation += 0.05;
            } else {
                if (this.y < HEIGHT - 80) {
                    this.vy += 0.2; // Fall back down
                } else if (this.mode !== 'fly') {
                    this.y = HEIGHT - 80;
                    this.vy = 0;
                }
                
                if (this.mode === 'hop') {
                    this.vy = Math.sin(Date.now() / 200) * 2;
                } else if (this.mode === 'fly') {
                    this.vy = Math.sin(Date.now() / 500) * 1.5;
                }
                
                this.rotation *= 0.9; // Straighten up
            }

            this.x += this.vx;
            this.y += this.vy;

            if (this.hitFlash > 0) this.hitFlash--;

            // Escape condition
            if ((this.side === 'left' && this.x > WIDTH + 50) || 
                (this.side === 'right' && this.x < -50)) {
                this.active = false;
                loseLife();
            }
            
            if (this.y < -100) { // Floated away in antigravity
                this.active = false;
                loseLife();
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            
            if (this.hitFlash > 0) {
                ctx.filter = 'brightness(5) hue-rotate(90deg)';
            }
            
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.emoji, 0, 0);
            
            // HP Bar
            if (this.hp < this.maxHp) {
                ctx.fillStyle = 'red';
                ctx.fillRect(-20, -30, 40, 4);
                ctx.fillStyle = 'lime';
                ctx.fillRect(-20, -30, 40 * (this.hp / this.maxHp), 4);
            }
            
            ctx.restore();
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = (Math.random() - 0.5) * 10;
            this.life = 1.0;
            this.color = color;
            this.size = Math.random() * 5 + 2;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.02;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.globalAlpha = 1;
        }
    }

    // Input Handling
    window.addEventListener('keydown', e => {
        if (e.key >= '1' && e.key <= '4') switchGun(parseInt(e.key) - 1);
        if (e.key.toLowerCase() === 'g') toggleAntiGravity();
    });

    canvas.addEventListener('mousedown', shoot);

    function switchGun(index) {
        currentGunIndex = index;
        document.querySelectorAll('.gun-slot').forEach((slot, i) => {
            slot.classList.toggle('active', i === index);
        });
        playSound(600, 'triangle', 0.1);
    }

    function toggleAntiGravity() {
        antiGravity = !antiGravity;
        gravityStatus.classList.toggle('active', antiGravity);
        antigravityTint.style.opacity = antiGravity ? '1' : '0';
        playSound(antiGravity ? 800 : 200, 'sine', 0.5, 0.1);
    }

    function shoot(e) {
        if (gameState !== 'PLAYING') return;
        
        const now = Date.now();
        const gun = GUNS[currentGunIndex];
        
        if (now - lastShotTime < gun.fireRate) return;
        lastShotTime = now;

        const rect = canvas.getBoundingClientRect();
        const mouseX = (e.clientX - rect.left) * (WIDTH / rect.width);
        const mouseY = (e.clientY - rect.top) * (HEIGHT / rect.height);

        // Visual Recoil/Muzzle Flash could go here
        playSound(gun.sound, 'square', 0.1, 0.1);

        for (let i = 0; i < gun.count; i++) {
            bullets.push(new Bullet(WIDTH/2, HEIGHT, mouseX, mouseY, gun));
        }
    }

    // Game Logic
    function spawnAnimal() {
        entities.push(new Animal());
    }

    function loseLife() {
        lives--;
        updateUI();
        if (lives <= 0) gameOver();
    }

    function updateUI() {
        scoreEl.innerText = `SCORE: ${score}`;
        waveEl.innerText = `WAVE: ${wave}`;
        livesEl.innerText = `LIVES: ${'❤️'.repeat(lives)}`;
    }

    function createExplosion(x, y, color, count = 10) {
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    function startGame() {
        score = 0;
        lives = 3;
        wave = 1;
        entities = [];
        bullets = [];
        particles = [];
        antiGravity = false;
        gameState = 'PLAYING';
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        gravityStatus.classList.remove('active');
        antigravityTint.style.opacity = '0';
        updateUI();
        requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        gameState = 'GAMEOVER';
        gameOverScreen.classList.remove('hidden');
        finalScoreEl.innerText = `Final Score: ${score}`;
    }

    // Background Elements
    const clouds = Array.from({length: 5}, () => ({
        x: Math.random() * WIDTH,
        y: Math.random() * 200,
        speed: Math.random() * 0.5 + 0.2,
        size: Math.random() * 60 + 40
    }));

    function drawBackground() {
        // Draw Stars in AntiGravity
        if (antiGravity) {
            ctx.fillStyle = 'white';
            for(let i=0; i<50; i++) {
                const x = (Math.sin(Date.now()*0.001 + i) * 0.5 + 0.5) * WIDTH;
                const y = (Math.cos(Date.now()*0.002 + i) * 0.5 + 0.5) * HEIGHT;
                ctx.globalAlpha = Math.random();
                ctx.fillRect(x, y, 2, 2);
            }
            ctx.globalAlpha = 1;
        }

        // Clouds
        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        clouds.forEach(c => {
            c.x += c.speed;
            if (c.x > WIDTH) c.x = -c.size;
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
            ctx.arc(c.x + 30, c.y - 10, c.size * 0.8, 0, Math.PI * 2);
            ctx.fill();
        });

        // Trees
        for (let i = 0; i < WIDTH; i += 150) {
            ctx.fillStyle = '#0a2e0a';
            ctx.beginPath();
            ctx.moveTo(i, HEIGHT - 50);
            ctx.lineTo(i + 50, HEIGHT - 250);
            ctx.lineTo(i + 100, HEIGHT - 50);
            ctx.fill();
        }

        // Ground
        ctx.fillStyle = '#051a05';
        ctx.fillRect(0, HEIGHT - 50, WIDTH, 50);
    }

    function gameLoop(time) {
        if (gameState !== 'PLAYING') return;

        const deltaTime = time - lastTime;
        lastTime = time;

        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        drawBackground();

        // Spawning logic
        spawnTimer -= deltaTime;
        if (spawnTimer <= 0) {
            spawnAnimal();
            spawnTimer = Math.max(500, 2000 - (wave * 100));
        }

        // Wave logic
        if (score > wave * 500) {
            wave++;
            updateUI();
            playSound(1000, 'sawtooth', 0.5);
        }

        // Update & Draw Bullets
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.update();
            b.draw();
            if (!b.active) bullets.splice(i, 1);
        }

        // Update & Draw Entities
        for (let i = entities.length - 1; i >= 0; i--) {
            const a = entities[i];
            a.update();
            a.draw();

            // Collision Check
            for (let j = bullets.length - 1; j >= 0; j--) {
                const b = bullets[j];
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 25) {
                    a.hp -= b.damage;
                    a.hitFlash = 5;
                    b.active = false;
                    playHitSound();
                    createExplosion(b.x, b.y, antiGravity ? '#bc13fe' : '#ffff00', 3);

                    if (a.hp <= 0) {
                        score += a.points;
                        updateUI();
                        createExplosion(a.x, a.y, 'red', 15);
                        playDeathSound();
                        entities.splice(i, 1);
                        break;
                    }
                }
            }

            if (!a.active) entities.splice(i, 1);
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.update();
            p.draw();
            if (p.life <= 0) particles.splice(i, 1);
        }

        requestAnimationFrame(gameLoop);
    }

</script>

</body>
</html>
